l_english:
  decision_clear_world:0 "Clear World"
  decision_clear_world_desc:0 "This world requires a clean slate. We will expedite the removal of all structures and resources, allowing us to start anew."

  # Edicts
  cs_accelerated_genetic_modification:0 "Accelerated Genetic Modification"
  cs_accelerated_genetic_modification_desc:0 "By infusing our genetic modification facilities with exotic gases, we can dramatically accelerate the rate at which our population undergoes genetic modification. Sub-species will be integrated into our primary species at an increased rate."

  cs_accelerated_purge_protocols:0 "Accelerated Purge Protocols"
  cs_accelerated_purge_protocols_desc:0 "Exotic gases can be weaponised to dramatically accelerate our purge operations, allowing us to process undesirable populations far more efficiently."

  # Decisions
  decision_expel_population:0 "Expel Population"
  decision_expel_population_desc:0 "Forcibly relocate all inhabitants of this world to other planets within our sector. If this is the only inhabited planet in the sector, the population will be dispersed to planets in a random other sector instead."
  decision_expel_population_no_destination:0 "There must be at least one other planet in the sector, or another sector with planets, to receive the expelled population."

  # Policies
  policy_subspecies_auto_integration:0 "Sub-Species Integration"
  policy_subspecies_auto_integration_desc:0 "Determines whether sub-species of our primary species are automatically integrated into the dominant species over time."

  policy_subspecies_auto_integration_disabled:0 "No Automatic Integration"
  policy_subspecies_auto_integration_disabled_desc:0 "Sub-species will not be automatically integrated into the primary species. Their genetic identity will be preserved."

  policy_subspecies_auto_integration_enabled:0 "Automatic Integration"
  policy_subspecies_auto_integration_enabled_desc:0 "Sub-species of our primary species will automatically be integrated, gradually merging them into the dominant species. Integration speed is increased."
