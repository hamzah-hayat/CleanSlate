l_english:
  decision_clear_world:0 "Clear World"
  decision_clear_world_desc:0 "This world requires a clean slate. We will expedite the removal of all structures and resources, allowing us to start anew."

  # Edicts
  cs_accelerated_genetic_modification:0 "Accelerated Genetic Modification"
  cs_accelerated_genetic_modification_desc:0 "By infusing our genetic modification facilities with exotic gases, we can dramatically accelerate the rate at which our population undergoes genetic modification. Sub-species will be integrated into our primary species at an increased rate."

  cs_accelerated_purge_protocols:0 "Accelerated Purge Protocols"
  cs_accelerated_purge_protocols_desc:0 "Specialized gases ensure they remain... compliant throughout the process. No resistance. No delays. Just the quiet efficiency of populations that fade away without struggle. The work proceeds much faster when they can't fight what's coming."

  # Decisions
  decision_expel_population:0 "Expel Population"
  decision_expel_population_desc:0 "Forcibly relocate all inhabitants of this world to other planets within our sector. If this is the only inhabited planet in the sector, the population will be dispersed to planets in a random sector instead."
  decision_expel_population_no_destination:0 "There must be at least one other planet in the sector, or another sector with planets, to receive the expelled population."

  decision_rapid_construction_enable:0 "Enable Rapid Construction"
  decision_rapid_construction_enable_desc:0 "Redirect industrial resources to dramatically accelerate construction on this world. Building speed is greatly increased, but so are building costs. The boost scales with our engineering technology. Cannot be activated while buildings are under construction."
  decision_rapid_construction_no_buildings_under_construction:0 "Cannot activate while buildings are under construction."

  decision_rapid_construction_disable:0 "Disable Rapid Construction"
  decision_rapid_construction_disable_desc:0 "Return this world's construction operations to normal. Building speed and costs will return to standard levels."

  cs_rapid_construction_t1:0 "Rapid Construction (Tier 1)"
  cs_rapid_construction_t1_desc:0 "Construction operations have been accelerated. Building speed and costs are increased by 250%."

  cs_rapid_construction_t2:0 "Rapid Construction (Tier 2)"
  cs_rapid_construction_t2_desc:0 "Advanced assembly patterns drive construction. Building speed and costs are increased by 500%."

  cs_rapid_construction_t3:0 "Rapid Construction (Tier 3)"
  cs_rapid_construction_t3_desc:0 "Optimised construction templates enable highly efficient building. Building speed and costs are increased by 750%."

  cs_rapid_construction_t4:0 "Rapid Construction (Tier 4)"
  cs_rapid_construction_t4_desc:0 "Megaengineering techniques enable maximum construction efficiency. Building speed and costs are increased by 1000%."

  decision_destroy_habitat:0 "Demolish Habitat"
  decision_destroy_habitat_desc:0 "Dismantle this habitat station entirely, recovering a small portion of the alloys used in its construction. The habitat must be completely empty before demolition can begin."
  decision_destroy_habitat_must_be_empty:0 "The habitat must have no population before it can be demolished."

  # Policies
  policy_subspecies_auto_integration:0 "Sub-Species Integration"
  policy_subspecies_auto_integration_desc:0 "Determines whether sub-species of our primary species are automatically integrated into the dominant species over time."

  policy_subspecies_auto_integration_disabled:0 "No Automatic Integration"
  policy_subspecies_auto_integration_disabled_desc:0 "Sub-species will not be automatically integrated into the primary species. Their genetic identity will be preserved."

  policy_subspecies_auto_integration_enabled:0 "Automatic Integration"
  policy_subspecies_auto_integration_enabled_desc:0 "Sub-species of our primary species will automatically be integrated, gradually merging them into the dominant species. Integration speed is increased."

  # Auto-Build Starbase Policy
  policy_auto_build_starbases:0 "Automatic Starbase Construction"
  policy_auto_build_starbases_desc:0 "Determines whether idle construction ships will automatically claim and build starbases in unclaimed systems."

  policy_auto_build_starbases_disabled:0 "Disabled"
  policy_auto_build_starbases_disabled_desc:0 "Construction ships will not automatically build starbases."

  policy_auto_build_starbases_adjacent:0 "Adjacent Systems Only"
  policy_auto_build_starbases_adjacent_desc:0 "Idle construction ships will automatically build starbases in unclaimed systems that are one hyperlane jump from our existing starbases."

  policy_auto_build_starbases_all:0 "All Reachable Systems"
  policy_auto_build_starbases_all_desc:0 "Idle construction ships will automatically build starbases in any unclaimed system within our borders, provided we can afford the influence cost."

  # Auto-Build Hyper Relay Policy
  policy_auto_build_hyper_relays:0 "Automatic Hyper Relay Construction"
  policy_auto_build_hyper_relays_desc:0 "Determines whether idle construction ships will automatically build hyper relays in systems within our borders."

  policy_auto_build_hyper_relays_disabled:0 "Disabled"
  policy_auto_build_hyper_relays_disabled_desc:0 "Construction ships will not automatically build hyper relays."

  policy_auto_build_hyper_relays_adjacent:0 "Extend Relay Network"
  policy_auto_build_hyper_relays_adjacent_desc:0 "Idle construction ships will automatically build hyper relays in systems adjacent to our existing relay network."

  policy_auto_build_hyper_relays_all:0 "All Systems Within Borders"
  policy_auto_build_hyper_relays_all_desc:0 "Idle construction ships will automatically build hyper relays in any system within our borders that does not already have one."
