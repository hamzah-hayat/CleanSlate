l_english:
  # Decisions
  cs_decision_clear_world:0 "Clear World"
  cs_decision_clear_world_desc:0 "This world requires a clean slate. We will expedite the removal of all structures and districts, allowing us to start anew."

  # Edicts
  edict_cs_accelerated_genetic_modification:0 "Exotic Gases for Genetic Modification"
  edict_cs_accelerated_genetic_modification_desc:0 "By infusing our genetic modification facilities with exotic gases, we can dramatically accelerate genetic changes across our population."

  edict_cs_accelerated_purge_protocols:0 "Exotic Gases for Purging Protocols"
  edict_cs_accelerated_purge_protocols_desc:0 "Specialized gases ensure that undesirable population groups are kept in a blissfully unaware mental state as we enact our purge protocols, making the overall process much quicker for our enforcers."

  cs_decision_relocate_population:0 "Relocate Population"
  cs_decision_relocate_population_desc:0 "Forcibly relocate all inhabitants of this world to other planets within our sector. If this is the only inhabited planet in the sector, the population will be dispersed to planets in a random sector instead."
  cs_decision_relocate_population_no_destination:0 "$TRIGGER_FAIL$There must be at least one other planet in the sector, or another sector with planets, to receive the expelled population."
  cs_decision_relocate_population_effect_tooltip:0 "All population groups on this world will be forcibly resettled to other planets within our sector. If no other planets exist in this sector, they will be dispersed across our empire."

  cs_decision_rapid_construction_enable:0 "Enable Rapid Construction"
  cs_decision_rapid_construction_enable_desc:0 "Redirect industrial resources to dramatically accelerate construction timelines on this world."
  cs_decision_rapid_construction_no_buildings_under_construction:0 "$TRIGGER_FAIL$Cannot activate while buildings are under construction."

  cs_decision_rapid_construction_disable:0 "Disable Rapid Construction"
  cs_decision_rapid_construction_disable_desc:0 "Return this world's construction operations to normal."

  cs_rapid_construction_t1:0 "Rapid Construction (Tier 1)"
  cs_rapid_construction_t1_desc:0 "Workers push beyond standard operational limits, drawing on industrial reserves to lay foundations faster than conventional schedules allow. The pace comes at a price — materials are consumed at a far greater rate."

  cs_rapid_construction_t2:0 "Rapid Construction (Tier 2)"
  cs_rapid_construction_t2_desc:0 "Assembly pattern techniques allow construction crews to coordinate with machine precision, eliminating downtime between phases. The efficiency gains are substantial, though the demand for raw materials scales accordingly."

  cs_rapid_construction_t3:0 "Rapid Construction (Tier 3)"
  cs_rapid_construction_t3_desc:0 "Standardised templates reduce planning overhead to near zero, allowing entire structures to be raised from pre-fabricated components. The sheer throughput required strains supply chains considerably."

  cs_rapid_construction_t4:0 "Rapid Construction (Tier 4)"
  cs_rapid_construction_t4_desc:0 "Principles developed for the grandest megastructures are applied at the planetary scale, compressing timelines that would otherwise span decades into mere months. The resource appetite of such an undertaking is immense."

